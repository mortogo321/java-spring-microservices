server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: order-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:orderdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  graphql:
    graphiql:
      enabled: true
    schema:
      printer:
        enabled: true
  sql:
    init:
      mode: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

order:
  cleanup:
    stale-minutes: 30
    rate-ms: 300000
  processing:
    delay-ms: 10000

logging:
  level:
    com.example.order: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  h2:
    console:
      settings:
        web-allow-others: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
